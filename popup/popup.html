<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LeetCode IntelliSense</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="popup-container">
    <!-- Header -->
    <div class="header">
      <div class="logo">
        <img src="../icons/icon48.png" alt="LeetCode IntelliSense" width="40" height="40" style="border-radius:8px;" />
      </div>
      <div class="title-block">
        <h1 class="title">IntelliSense</h1>
        <p class="subtitle">for LeetCode</p>
      </div>
    </div>

    <!-- Toggle Row -->
    <div class="toggle-row">
      <div class="toggle-info">
        <span class="toggle-label" id="toggle-label">Active</span>
        <span class="toggle-desc" id="toggle-desc">Hover tooltips enabled on leetcode.com</span>
      </div>
      <label class="switch" for="toggle" aria-label="Enable or disable IntelliSense">
        <input type="checkbox" id="toggle" checked />
        <span class="slider"></span>
      </label>
    </div>

    <!-- Coverage Info -->
    <div class="coverage">
      <p class="coverage-title">Coverage</p>
      <div class="pkg-list">
        <span class="pkg-tag">Java</span>
        <span class="pkg-tag">C++</span>
        <span class="pkg-tag">Python 3</span>
      </div>
      <p class="coverage-note">
        Hover over types &amp; methods, use <code>.</code> for completions,
        and get parameter hints inside <code>()</code>.
      </p>
    </div>

    <!-- Footer -->
    <div class="footer">
      <span>v1.1.0</span>
      <span>·</span>
      <span>Firefox 128+</span>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
